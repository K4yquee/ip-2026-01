<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Saúde - Acesso ao Prontuário</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/login.style.css">
</head>
<body>
    <div id="container">
        <header class="form-header">
            <h3>Acesso Restrito</h3>
            <p>Insira suas credenciais para visualizar seu prontuário digital</p>
        </header>

        <form method="POST" action="/login">
            <div class="input-group">
                <label for="email">E-mail do Paciente:</label>
                <input id="email" name="email" placeholder="Digite seu e-mail cadastrado" type="email" required autocomplete="email">
            </div>
            
            <div class="input-group">
                <label for="password">Senha de Acesso:</label>
                <input id="password" name="password" placeholder="Digite sua senha" type="password" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-submit">
                <span>Entrar</span>
            </button>
        </form>

        <a href="/index.html" class="link-back">Voltar ao Portal</a>
    </div>
</body>
</html>
